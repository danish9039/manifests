name: Helm Schema Validation

on:
  push:
    paths:
      - 'experimental/helm/charts/**'
      - '.github/workflows/helm-schema-validation.yml'
  pull_request:
    paths:
      - 'experimental/helm/charts/**'
      - '.github/workflows/helm-schema-validation.yml'

permissions:
  contents: read
  actions: read

jobs:
  validate:
    name: ${{ matrix.scenario }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: KFP / platform-agnostic-multi-user
            scenario_id: kfp-platform-agnostic-multi-user
            chart: experimental/helm/charts/pipelines
            values: experimental/helm/charts/pipelines/ci/values-platform-agnostic-multi-user.yaml
          - scenario: KFP / platform-agnostic-multi-user-k8s-native
            scenario_id: kfp-platform-agnostic-multi-user-k8s-native
            chart: experimental/helm/charts/pipelines
            values: experimental/helm/charts/pipelines/ci/values-platform-agnostic-multi-user-k8s-native.yaml
          - scenario: Katib / standalone
            scenario_id: katib-standalone
            chart: experimental/helm/charts/katib
            values: experimental/helm/charts/katib/ci/values-standalone.yaml
          - scenario: Katib / cert-manager
            scenario_id: katib-cert-manager
            chart: experimental/helm/charts/katib
            values: experimental/helm/charts/katib/ci/values-cert-manager.yaml
          - scenario: Katib / external-db
            scenario_id: katib-external-db
            chart: experimental/helm/charts/katib
            values: experimental/helm/charts/katib/ci/values-external-db.yaml
          - scenario: Katib / leader-election
            scenario_id: katib-leader-election
            chart: experimental/helm/charts/katib
            values: experimental/helm/charts/katib/ci/values-leader-election.yaml
          - scenario: Katib / openshift
            scenario_id: katib-openshift
            chart: experimental/helm/charts/katib
            values: experimental/helm/charts/katib/ci/values-openshift.yaml
          - scenario: Katib / standalone-postgres
            scenario_id: katib-standalone-postgres
            chart: experimental/helm/charts/katib
            values: experimental/helm/charts/katib/ci/values-postgres.yaml
          - scenario: Katib / with-kubeflow
            scenario_id: katib-with-kubeflow
            chart: experimental/helm/charts/katib
            values: experimental/helm/charts/katib/ci/values-kubeflow.yaml
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.0
        with:
          version: v3.14.4

      - name: Install kubeconform
        run: |
          curl -sL https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin/
          kubeconform -v

      - name: Run helm lint and kubeconform
        env:
          SCHEMA_VALIDATION_SCENARIO: ${{ matrix.scenario }}
          SCHEMA_VALIDATION_SCENARIO_ID: ${{ matrix.scenario_id }}
          SCHEMA_VALIDATION_RESULTS_DIR: ${{ runner.temp }}/schema-validation-results
        run: |
          chmod +x experimental/helm/scripts/validate-schema.sh
          experimental/helm/scripts/validate-schema.sh "${{ matrix.chart }}" "${{ matrix.values }}"

      - name: Upload scenario results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: schema-validation-${{ matrix.scenario_id }}
          path: ${{ runner.temp }}/schema-validation-results/${{ matrix.scenario_id }}.json
          if-no-files-found: warn

  summary:
    name: Summary
    if: always()
    needs:
      - validate
    runs-on: ubuntu-latest
    steps:
      - name: Download scenario results
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/schema-validation-results
          pattern: schema-validation-*
          merge-multiple: true

      - name: Build markdown summary
        env:
          RESULTS_DIR: ${{ runner.temp }}/schema-validation-results
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          results_dir = os.environ["RESULTS_DIR"]
          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          expected = [
              ("kfp-platform-agnostic-multi-user", "KFP / platform-agnostic-multi-user"),
              ("kfp-platform-agnostic-multi-user-k8s-native", "KFP / platform-agnostic-multi-user-k8s-native"),
              ("katib-standalone", "Katib / standalone"),
              ("katib-cert-manager", "Katib / cert-manager"),
              ("katib-external-db", "Katib / external-db"),
              ("katib-leader-election", "Katib / leader-election"),
              ("katib-openshift", "Katib / openshift"),
              ("katib-standalone-postgres", "Katib / standalone-postgres"),
              ("katib-with-kubeflow", "Katib / with-kubeflow"),
          ]

          rows = []
          has_failure = False

          for scenario_id, scenario_name in expected:
              path = os.path.join(results_dir, f"{scenario_id}.json")
              if not os.path.exists(path):
                  rows.append((scenario_name, "FAIL (missing result)", "FAIL (missing result)"))
                  has_failure = True
                  continue

              with open(path, encoding="utf-8") as handle:
                  data = json.load(handle)

              lint = data["lint_result"]
              kube = data["kubeconform_result"]
              kube_summary = data["kubeconform_summary"].replace("|", "\\|")
              kube_cell = f"{kube} ({kube_summary})"
              rows.append((scenario_name, lint, kube_cell))

              if lint == "FAIL" or kube == "FAIL":
                  has_failure = True

          lines = [
              "## Helm Schema Validation",
              "",
              "| Scenario | helm lint | kubeconform |",
              "| --- | --- | --- |",
          ]

          for row in rows:
              lines.append(f"| {row[0]} | {row[1]} | {row[2]} |")

          with open(summary_path, "a", encoding="utf-8") as handle:
              handle.write("\n".join(lines) + "\n")

          if has_failure:
              sys.exit(1)
          PY
