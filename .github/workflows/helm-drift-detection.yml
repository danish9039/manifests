name: Helm Drift Detection

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  detect-drift:
    name: Drift Check (${{ matrix.scenario }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - scenario: platform-agnostic-multi-user
          - scenario: platform-agnostic-multi-user-k8s-native
          - scenario: standalone
          - scenario: cert-manager
          - scenario: external-db
          - scenario: leader-election
          - scenario: openshift
          - scenario: standalone-postgres
          - scenario: with-kubeflow
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependency
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Set up Helm
        uses: azure/setup-helm@v4.3.0
        with:
          version: v3.16.3

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: 4.5.7

      - name: Set up Kind
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: helm-drift

      - name: Run drift check
        id: drift
        shell: bash
        env:
          DRIFT_RESULTS_DIR: /tmp/drift-results
        run: |
          mkdir -p /tmp/drift-results /tmp/drift-logs
          chmod +x experimental/helm/scripts/check-drift.sh
          set +e
          experimental/helm/scripts/check-drift.sh "${{ matrix.scenario }}" 2>&1 | tee "/tmp/drift-logs/${{ matrix.scenario }}.log"
          status=${PIPESTATUS[0]}
          set -e
          echo "exit_code=${status}" >> "${GITHUB_OUTPUT}"
          exit 0

      - name: Upload drift artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-${{ matrix.scenario }}
          path: |
            /tmp/drift-results/${{ matrix.scenario }}.json
            /tmp/drift-logs/${{ matrix.scenario }}.log
          retention-days: 7

      - name: Mark scenario failed on drift
        if: steps.drift.outputs.exit_code != '0'
        run: exit 1

  aggregate:
    name: Aggregate Drift Results
    runs-on: ubuntu-latest
    needs: detect-drift
    if: always()
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download drift artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: drift-*
          path: /tmp/drift-artifacts
          merge-multiple: true

      - name: Build drift summary
        id: summary
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          artifacts_dir = Path("/tmp/drift-artifacts")
          result_files = sorted(artifacts_dir.glob("*.json"))
          rows = []
          drifted = []
          for result_file in result_files:
              data = json.loads(result_file.read_text(encoding="utf-8"))
              rows.append((data["scenario"], data["result"], data["summary"]))
              if data["result"] != "PASS":
                  drifted.append(data)

          table_lines = [
              "## Helm Drift Detection",
              "",
              "| Scenario | Result | Summary |",
              "| --- | --- | --- |",
          ]
          for scenario, result, summary in rows:
              table_lines.append(f"| {scenario} | {result} | {summary} |")

          summary_text = "\n".join(table_lines) + "\n"
          Path("/tmp/drift-summary.md").write_text(summary_text, encoding="utf-8")

          issue_lines = list(table_lines)
          if drifted:
              issue_lines.extend(["", "### Drift Excerpts", ""])
              for item in drifted:
                  issue_lines.append(f"#### {item['scenario']}")
                  issue_lines.append("")
                  issue_lines.append("```text")
                  issue_lines.append(item.get("excerpt", "Drift detected"))
                  issue_lines.append("```")
                  issue_lines.append("")
          Path("/tmp/drift-issue-body.md").write_text("\n".join(issue_lines).rstrip() + "\n", encoding="utf-8")

          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
              handle.write(f"drift_count={len(drifted)}\n")
          PY
          cat /tmp/drift-summary.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Report drift issue
        if: steps.summary.outputs.drift_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          existing_issue_number="$(gh issue list \
            --repo "${GITHUB_REPOSITORY}" \
            --label helm-drift \
            --state open \
            --json number \
            --jq '.[0].number // empty')"

          issue_title="Helm chart drift detected — $(date -u +%Y-%m-%d)"

          if [[ -z "${existing_issue_number}" ]]; then
            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${issue_title}" \
              --body-file /tmp/drift-issue-body.md \
              --label helm-drift \
              --label needs-triage
          else
            gh issue comment \
              --repo "${GITHUB_REPOSITORY}" \
              "${existing_issue_number}" \
              --body-file /tmp/drift-issue-body.md
          fi

      - name: Fail workflow on detected drift
        if: steps.summary.outputs.drift_count != '0'
        run: exit 1
