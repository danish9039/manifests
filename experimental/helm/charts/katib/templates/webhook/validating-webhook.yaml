{{- if and .Values.webhook.enabled .Values.webhook.validating.enabled }}
{{- $annotations := dict -}}
{{- with .Values.webhook.validating.annotations -}}
{{- range $key, $value := . -}}
{{- $_ := set $annotations $key $value -}}
{{- end -}}
{{- end -}}
{{- if and .Values.webhook.certManager.enabled (not (hasKey $annotations "cert-manager.io/inject-ca-from")) -}}
{{- $_ := set $annotations "cert-manager.io/inject-ca-from" (printf "%s/katib-webhook-cert" (include "katib.namespace" .)) -}}
{{- end -}}
{{- if and .Values.openshift.enabled .Values.openshift.serviceCertificates (not (hasKey $annotations "service.beta.openshift.io/inject-cabundle")) -}}
{{- $_ := set $annotations "service.beta.openshift.io/inject-cabundle" "true" -}}
{{- end -}}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: {{ include "katib.webhook.validatingName" . }}
  labels:
    {{- include "katib.webhook.labels" . | nindent 4 }}
  {{- if $annotations }}
  annotations:
    {{- toYaml $annotations | nindent 4 }}
  {{- end }}
webhooks:
  - name: validator.experiment.katib.kubeflow.org
    sideEffects: None
    admissionReviewVersions:
      - v1
    clientConfig:
      service:
        name: {{ include "katib.controller.serviceName" . }}
        namespace: {{ include "katib.namespace" . }}
        path: /validate-experiment
      {{- if and (not .Values.webhook.certManager.enabled) (not .Values.openshift.serviceCertificates) }}
      caBundle: {{ .Values.webhook.caBundle | b64enc }}
      {{- end }}
    rules:
      - apiGroups:
          - kubeflow.org
        apiVersions:
          - v1beta1
        operations:
          - CREATE
          - UPDATE
        resources:
          - experiments
    {{- with .Values.webhook.validating.failurePolicy }}
    failurePolicy: {{ . }}
    {{- end }}
    {{- with .Values.webhook.validating.namespaceSelector }}
    namespaceSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
{{- end }}
