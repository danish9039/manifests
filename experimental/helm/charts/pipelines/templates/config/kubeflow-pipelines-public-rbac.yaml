{{- if and (eq .Values.installMode.type "multi-user") .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kubeflow-pipelines-public
  namespace: {{ include "kubeflow-pipelines.namespace" . }}
  labels:
    app: ml-pipeline
    {{- include "kubeflow-pipelines.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  resourceNames:
  - kubeflow-pipelines-public
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kubeflow-pipelines-public
  namespace: {{ include "kubeflow-pipelines.namespace" . }}
  labels:
    app: ml-pipeline
    {{- include "kubeflow-pipelines.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kubeflow-pipelines-public
subjects:
- kind: Group
  apiGroup: rbac.authorization.k8s.io
  name: system:authenticated
{{- end }}
