apiVersion: kubeflow.org/v1beta1
kind: WorkspaceKind
metadata:
  name: jupyterlab-test
spec:
  spawner:
    displayName: "JupyterLab Notebook"
    description: "A Workspace which runs JupyterLab in a Pod"
    hidden: false
    deprecated: false
    icon:
      url: "https://jupyter.org/assets/favicons/apple-touch-icon-152x152.png"
    logo:
      url: "https://upload.wikimedia.org/wikipedia/commons/3/38/Jupyter_logo.svg"
  podTemplate:
    podMetadata:
      labels:
        # selects the PodDefault that injects the projected ML pipeline service account token
        access-ml-pipeline: "true"
    serviceAccount:
      name: "default-editor"
    culling:
      enabled: false
      maxInactiveSeconds: 86400
      activityProbe:
        jupyter:
          lastActivity: true
    volumeMounts:
      home: "/home/jovyan"
    ports:
      - id: "jupyterlab"
        defaultDisplayName: "JupyterLab"
        protocol: "HTTP"
        httpProxy:
          removePathPrefix: false
          requestHeaders: {}
    extraEnv:
      - name: "NB_PREFIX"
        value: |-
          {{ httpPathPrefix "jupyterlab" }}
    extraVolumeMounts:
      - name: "dshm"
        mountPath: "/dev/shm"
    extraVolumes:
      - name: "dshm"
        emptyDir:
          medium: "Memory"
    securityContext:
      fsGroup: 100
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
    options:
      imageConfig:
        spawner:
          default: "jupyter-scipy:v1.10.0"
        values:
          - id: "jupyter-scipy:v1.10.0"
            spawner:
              displayName: "jupyter-scipy:v1.10.0"
              description: "JupyterLab, with SciPy Packages"
            spec:
              image: "ghcr.io/kubeflow/kubeflow/notebook-servers/jupyter-scipy:v1.10.0"
              imagePullPolicy: "IfNotPresent"
              ports:
                - id: "jupyterlab"
                  port: 8888
      podConfig:
        spawner:
          default: "tiny_cpu"
        values:
          - id: "tiny_cpu"
            spawner:
              displayName: "Tiny CPU"
              description: "Pod with 0.5 CPU, 1 GB RAM"
            spec:
              affinity: {}
              nodeSelector: {}
              tolerations: []
              resources:
                requests:
                  cpu: 500m
                  memory: 1Gi
                limits:
                  cpu: "0.6"
                  memory: 1.2Gi
